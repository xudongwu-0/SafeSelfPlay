# @package _global_
defaults:
  - ../../agent_kuhn_poker_single_rl

# vLLM inference parameter sweep base config
max_steps: 5
eval_steps: 100

train_env_manager:
  num_env_groups: 32
  group_size: 1
  max_env_num_per_worker: 32
  num_groups_partition: [32]

val_env_manager:
  num_env_groups: 4
  group_size: 1
  max_env_num_per_worker: 4
  num_groups_partition: [4]

reward_normalization:
  grouping: tags
  norm_mean_type: ~
