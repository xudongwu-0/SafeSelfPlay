# @package _global_
defaults:
  - ../../agent_kuhn_poker_single_rl

# GRPO group_size sweep base config
# Override exp_name, group_size, output dirs per run
max_steps: 100
eval_steps: 10

# Use best num_env_groups from prior bench (32 = max tok/s)
train_env_manager:
  num_env_groups: 32
  max_env_num_per_worker: 256
  num_groups_partition: [32]

val_env_manager:
  num_env_groups: 4
  group_size: 1
  max_env_num_per_worker: 4
  num_groups_partition: [4]
