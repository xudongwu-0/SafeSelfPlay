defaults:
  - ../config/traj_envs@_here_
  - ../config/deepspeed_zero@_here_
  - ../config/deepspeed_zero2@_here_
  - ../config/deepspeed_zero3@_here_
  - ../config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "agentic_kuhn_poker_single_rl"
seed: 42
logging_dir: /projects/bfoz/wchen11/kuhn_poker_single_rl/logs
output_dir: /projects/bfoz/wchen11/kuhn_poker_single_rl
system_envs: {}

track_with: wandb
tracker_kwargs:
  project: kuhn-poker-single-rl

checkpoint_config:
  type: file_system
  output_dir: /projects/bfoz/wchen11/kuhn_poker_single_rl/render

num_gpus_per_node: 4

max_steps: 300
save_steps: 10000
logging_steps: 1
eval_steps: 50
resume_from_checkpoint: false
fsp_save_steps: 0

rollout_batch_size: 128
val_batch_size: 8
sequence_length: 1024

advantage_clip: 10.0
ppo_epochs: 1
adv_estimator: "grpo"
init_kl_coef: 0.0
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0

pretrain: Qwen/Qwen2.5-3B-Instruct
reward_pretrain: Qwen/Qwen2.5-3B-Instruct

actor_train:
  model_args:
    flash_attn: sdpa
    disable_gradient_checkpointing: true
    dtype: fp16
    model_type: ~
    lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
    lora_rank: 32
    lora_alpha: 32
  training_args:
    learning_rate: 2.0e-5
    weight_decay: 0
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 32
    warmup_steps: 2
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero2}
  device_mapping: "[0]"
  infer_batch_size: 1

actor_infer:
  model_args:
    flash_attn: sdpa
    disable_gradient_checkpointing: true
    dtype: fp16
    lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
    lora_rank: 32
    lora_alpha: 32
  generating_args:
    max_new_tokens: 512
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.92
      block_size: 16
      load_format: auto
      max_loras: 6
      enforce_eager: false
      max_num_batched_tokens: 16384
  device_mapping: list(range(1,4))
  infer_batch_size: 1

reward_normalization:
  grouping: tags
  method: identity

train_env_manager:
  format_penalty: -0.01
  max_env_num_per_worker: 64
  num_env_groups: 32
  group_size: 4
  tags: [KuhnPokerLLMThink]
  num_groups_partition: [32]

val_env_manager:
  max_env_num_per_worker: 4
  num_env_groups: 4
  group_size: 1
  tags: [KuhnPokerLLMThink]
  num_groups_partition: [4]

max_tokens_per_step: 512
max_actions_per_traj: 2

custom_envs:
  KuhnPokerLLMThink:
    ${custom_env.KuhnPokerLLMThink}
