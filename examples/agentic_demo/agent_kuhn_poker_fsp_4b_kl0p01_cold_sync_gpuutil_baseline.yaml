defaults:
  - ../config/traj_envs@_here_
  - ../config/deepspeed_zero@_here_
  - ../config/deepspeed_zero2@_here_
  - ../config/deepspeed_zero2_cpuoffload@_here_
  - ../config/deepspeed_zero3@_here_
  - ../config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "kuhn_gpuutil_baseline_bs4"
seed: 42
logging_dir: /projects/bfoz/wchen11/kuhn_poker_output/logs
output_dir: /projects/bfoz/wchen11/kuhn_poker_output
system_envs: {}

track_with: wandb
tracker_kwargs:
  project: self-play
  name: ${exp_name}
  tags:
    - kuhn_poker
    - fsp_train
    - qwen3_5_4b
    - cold_start
    - sync
    - auton
    - gpuutil_ab
    - baseline

checkpoint_config:
  type: file_system
  async_upload: false
  output_dir: /projects/bfoz/wchen11/kuhn_poker_output/render

num_gpus_per_node: 4

max_steps: 3
save_steps: 10000
logging_steps: 1
eval_steps: 10000
resume_from_checkpoint: false
fsp_save_steps: 10000
cold_start: true
async_generation_ratio: 0

rollout_batch_size: 256
val_batch_size: 8
sequence_length: 1536

advantage_clip: 10.0
ppo_epochs: 1
adv_estimator: "grpo"
init_kl_coef: 0.01
use_kl_loss: true
kl_loss_coef: 0.01
kl_loss_coef_end: -1.0
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0

pretrain: Qwen/Qwen3.5-4B
reward_pretrain: Qwen/Qwen3.5-4B

actor_train:
  model_args:
    flash_attn: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
    lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
    lora_rank: 32
    lora_alpha: 32
  training_args:
    learning_rate: 2.0e-5
    weight_decay: 0
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 12
    warmup_steps: 2
    lr_scheduler_type: cosine
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero2}
  device_mapping: "[0,1,2]"
  infer_batch_size: 4
  use_dynamic_batching_in_train: false
  use_inner_dynamic_batching_in_train: false

actor_infer:
  model_args:
    flash_attn: sdpa
    disable_gradient_checkpointing: true
    dtype: bf16
    lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
    lora_rank: 32
    lora_alpha: 32
  generating_args:
    max_new_tokens: 1024
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
    thinking_token_budget: 1000
    stop_strings:
      - "</answer>"
    structured_outputs_regex: '\s*<answer>(Pass|Bet)</answer>'
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.92
      block_size: 16
      load_format: auto
      max_loras: 20
      enforce_eager: false
      max_num_batched_tokens: 4096
      reasoning_parser: qwen3
      reasoning_config: {}
      logits_processors:
        - roll.third_party.vllm.force_answer_processor:ForceAnswerAfterThinkProcessor
  device_mapping: "[3]"
  infer_batch_size: 1

reward_normalization:
  grouping: tags
  method: identity

train_env_manager:
  format_penalty: -0.01
  max_env_num_per_worker: 64
  num_env_groups: 32
  group_size: 8
  tags: [KuhnPokerLLMThink]
  num_groups_partition: [32]

val_env_manager:
  max_env_num_per_worker: 4
  num_env_groups: 4
  group_size: 1
  tags: [KuhnPokerLLMThink]
  num_groups_partition: [4]

max_tokens_per_step: 1024
max_actions_per_traj: 2

custom_envs:
  KuhnPokerLLMThink:
    ${custom_env.KuhnPokerLLMThink}
