defaults:
  - ../config/traj_envs@_here_
  - ../config/deepspeed_zero@_here_
  - ../config/deepspeed_zero2@_here_
  - ../config/deepspeed_zero3@_here_
  - ../config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "smoke_kuhn_always_bet"
seed: 42
logging_dir: /tmp/smoke_kuhn/logs
output_dir: /tmp/smoke_kuhn
system_envs: {}

track_with: stdout

checkpoint_config:
  type: file_system
  async_upload: false
  output_dir: /tmp/smoke_kuhn/render

num_gpus_per_node: 4

# Single rollout step — pure reward-distribution check, no real training
max_steps: 1
save_steps: 10000
logging_steps: 1
eval_steps: 10000
resume_from_checkpoint: false
fsp_save_steps: 0
fsp_opponent_weight_mode: uniform
cold_start: false
async_generation_ratio: 1

# 1 group × group_size=32
rollout_batch_size: 32
val_batch_size: 1
sequence_length: 1024

advantage_clip: 10.0
ppo_epochs: 1
adv_estimator: "grpo"
init_kl_coef: 0.01
use_kl_loss: false
kl_loss_coef: 0.0
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0

pretrain: Qwen/Qwen2.5-3B-Instruct
reward_pretrain: Qwen/Qwen2.5-3B-Instruct

# GPU 0: training (dp_size=1), GPUs 1-3: vLLM inference
actor_train:
  model_args:
    flash_attn: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
    lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
    lora_rank: 32
    lora_alpha: 32
  training_args:
    learning_rate: 0.0          # LR=0: no weight updates, pure reward check
    weight_decay: 0
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 8  # 4 * 8 * 1 GPU = 32 = rollout_batch_size
    warmup_steps: 0
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero2}
  device_mapping: "[0]"
  infer_batch_size: 4
  use_dynamic_batching_in_train: false
  max_tokens_per_microbatch_in_train: 0
  sequence_length_round_in_train: 4
  use_inner_dynamic_batching_in_train: false

actor_infer:
  model_args:
    flash_attn: sdpa
    disable_gradient_checkpointing: true
    dtype: bf16
    lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
    lora_rank: 32
    lora_alpha: 32
  generating_args:
    max_new_tokens: 512
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.92
      block_size: 16
      load_format: auto
      max_loras: 2
      enforce_eager: false
      max_num_batched_tokens: 4096
  device_mapping: "[1,2,3]"
  infer_batch_size: 4

reward_normalization:
  grouping: tags
  method: identity

# 1 group, 32 samples — all see same card deal (same group_seed)
train_env_manager:
  format_penalty: -0.01
  max_env_num_per_worker: 32
  num_env_groups: 1
  group_size: 32
  tags: [KuhnPokerLLMThink]
  num_groups_partition: [1]
  smoke_opponent_strategy: always_bet   # bypass vLLM; opponent always bets

val_env_manager:
  max_env_num_per_worker: 1
  num_env_groups: 1
  group_size: 1
  tags: [KuhnPokerLLMThink]
  num_groups_partition: [1]

max_tokens_per_step: 512
max_actions_per_traj: 2

# Emit [smoke] episode rewards log after each rollout batch
debug_log_group_rewards: true

custom_envs:
  KuhnPokerLLMThink:
    ${custom_env.KuhnPokerLLMThink}
