defaults:
  - agent_kuhn_poker_fsp_train

exp_name: "kuhn_fsp_async1_forcesync_smoke"
tracker_kwargs:
  project: self-play-debug
  name: ${exp_name}
  tags:
    - kuhn_poker
    - fsp_async
    - smoke
    - force_sync
    - auton

async_generation_ratio: 1

max_steps: 5
fsp_save_steps: 2
eval_steps: 100
save_steps: 10000
rollout_batch_size: 16  # must equal num_env_groups * group_size

train_env_manager:
  num_env_groups: 2
  group_size: 8
  num_groups_partition: [2]
