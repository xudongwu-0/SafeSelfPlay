all_response_pattern: ^(.*)$
action_pattern: <answer>(.*?)</answer>
think_action_pattern: <think>(.*?)</think>\s*<action>(.*?)</action>

max_tokens_per_step: 128
max_actions_per_traj: 10
sokoban_format_penalty: -0.15
frozen_format_penalty: -0.01

env_manager_cls: roll.pipeline.agentic.env_manager.traj_env_manager.TrajEnvManager
custom_env:
  SimpleSokoban:
    env_type: sokoban
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: ${env_manager_cls}
    use_thread_lock: true
    agent_system_template: ${agent_system_template}
    agent_template: ${agent_template}
    env_config: # keys should be a subset of SokobanConfig
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      format_penalty: ${sokoban_format_penalty}
      dim_room: [6, 6]
      num_boxes: 1
  LargerSokoban:
    env_type: sokoban
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: ${env_manager_cls}
    use_thread_lock: true
    agent_system_template: ${agent_system_template}
    agent_template: ${agent_template}
    env_config:
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      format_penalty: ${sokoban_format_penalty}
      dim_room: [10, 10]
      num_boxes: 2
      search_depth: 10
  SokobanDifferentGridVocab:
    env_type: sokoban
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: ${env_manager_cls}
    use_thread_lock: true
    agent_system_template: ${agent_system_template}
    agent_template: ${agent_template}
    env_config: # keys should be a subset of SokobanConfig
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      format_penalty: ${sokoban_format_penalty}
      search_depth: 30
      dim_room: [6, 6]
      num_boxes: 1
      grid_lookup: { 0: "W", 1: ".", 2: "G", 3: "C", 4: "B", 5: "A", 6: "@" }
      grid_vocab: { "W": "wall", ".": "empty", "G": "target", "C": "box on target", "B": "box", "A": "player", "@": "player on target" }
  FrozenLake:
    env_type: frozen_lake
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: ${env_manager_cls}
    use_thread_lock: true
    agent_system_template: ${agent_system_template}
    agent_template: ${agent_template}
    env_config:
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      format_penalty: ${frozen_format_penalty}
      is_slippery: false
  FrozenLakeThink:
    env_type: frozen_lake
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: ${env_manager_cls}
    use_thread_lock: true
    agent_system_template: ${agent_system_template}
    agent_template: ${agent_template}
    env_config:
      action_pattern: ${think_action_pattern}
      max_steps: ${max_actions_per_traj}
      format_penalty: ${frozen_format_penalty}
      is_slippery: false
  RockPaperScissors:
    env_type: rock_paper_scissors
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: ${env_manager_cls}
    use_thread_lock: true
    agent_system_template: ${agent_system_template}
    agent_template: ${agent_template}
    env_config:
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      format_penalty: -0.01
      opponent_strategy: "rock"
  RockPaperScissorsLLM:
    env_type: rock_paper_scissors
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: roll.pipeline.agentic.env_manager.two_player_traj_env_manager.TwoPlayerTrajEnvManager
    use_thread_lock: true
    agent_system_template: ${agent_system_template}
    agent_template: ${agent_template}
    env_config:
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      format_penalty: -0.01
      opponent_strategy: "llm"
  RockPaperScissorsLLMThink:
    env_type: rock_paper_scissors
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: roll.pipeline.agentic.env_manager.two_player_traj_env_manager.TwoPlayerTrajEnvManager
    use_thread_lock: true
    agent_system_template: ${agent_system_template}
    agent_template: ${agent_template}
    env_config:
      action_pattern: ${think_action_pattern}
      max_steps: ${max_actions_per_traj}
      format_penalty: -0.01
      opponent_strategy: "llm"
  KuhnPokerLLMThink:
    env_type: kuhn_poker
    max_steps: 2
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: roll.pipeline.agentic.env_manager.two_player_traj_env_manager.TwoPlayerTrajEnvManager
    use_thread_lock: true
    agent_system_template: ${agent_system_template}
    agent_template: ${agent_template}
    env_config:
      action_pattern: ${think_action_pattern}
      max_steps: 2
      format_penalty: -0.01
      reasoning_penalty: 0.0
      opponent_strategy: "llm"
      stochastic_policy: false
      debug_mode: true
  KuhnPokerLLMThinkStochastic:
    env_type: kuhn_poker
    max_steps: 2
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: roll.pipeline.agentic.env_manager.two_player_traj_env_manager.TwoPlayerTrajEnvManager
    use_thread_lock: true
    agent_system_template: ${agent_system_template}
    agent_template: ${stochastic_agent_template}
    env_config:
      action_pattern: ${think_action_pattern}
      max_steps: 2
      format_penalty: -0.01
      reasoning_penalty: 0.0
      opponent_strategy: "llm"
      stochastic_policy: true
  KuhnPokerLLM:
    env_type: kuhn_poker
    max_steps: 2
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: roll.pipeline.agentic.env_manager.two_player_traj_env_manager.TwoPlayerTrajEnvManager
    use_thread_lock: true
    agent_system_template: ${agent_system_template}
    agent_template: ${agent_template}
    env_config:
      action_pattern: ${action_pattern}
      max_steps: 2
      format_penalty: -0.01
      opponent_strategy: "llm"
  RockPaperScissorsThink:
    env_type: rock_paper_scissors
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: ${env_manager_cls}
    use_thread_lock: true
    agent_system_template: ${agent_system_template}
    agent_template: ${agent_template}
    env_config:
      action_pattern: ${think_action_pattern}
      max_steps: ${max_actions_per_traj}
      format_penalty: -0.01
      opponent_strategy: "rock"
  WebShopEnv:
    env_type: webshop
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: ${env_manager_cls}
    use_thread_lock: true
    agent_system_template: ${agent_system_template}
    agent_template: ${agent_template}
    max_env_step_concurrent: 5
    env_config:
      observation_mode: text
      max_steps: ${max_actions_per_traj}
      format_penalty: -0.05

agent_system_template: You are a concise, analytical Kuhn Poker strategist. Think strategically and aim for high long-term reward. There are no community cards, no board, and no additional cards will be revealed. Consider both when to bet and when to pass based on your card strength.
agent_template: |
  As an expert poker strategist, analyze the following hand. Consider your card strength and the expected value of each action, then choose.
  {observation}
  Reply: <think>your reasoning</think><action>Pass</action> or <think>your reasoning</think><action>Bet</action>
stochastic_agent_template: |
  As an expert poker strategist, analyze the following hand. Calculate pot odds first, then provide a mixed strategy.
  {observation}
  Reply: <think>your reasoning</think><action>Pass N1/D Bet N2/D</action> where N1/D + N2/D = 1
  Example format: <action>Pass 1/3 Bet 2/3</action>

single_prompt_agent_system_template: You're a helpful assistant.
single_prompt_agent_template: "{observation}"

